name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-py311-venv-${{ hashFiles('uv.lock') }}

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check src/ tests/

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-py311-venv-${{ hashFiles('uv.lock') }}

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Mypy
        run: uv run mypy --strict src/youtube_mcp/

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-py311-venv-${{ hashFiles('uv.lock') }}

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Unit tests
        run: uv run pytest tests/unit

  integration:
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: ${{ runner.os }}-py311-venv-${{ hashFiles('uv.lock') }}

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Integration tests
        run: uv run pytest tests/integration
